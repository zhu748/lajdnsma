
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/assets/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini API 代理服务</title>
    <script type="module" crossorigin src="/assets/main.js"></script>
    <link rel="stylesheet" href="/assets/index.css">
  </head>
  <body>
    <div id="app"></div>
    <script>
      (() => {
        const panels = [
          {
            key: 'responses',
            title: 'Responses API Model Mapping',
            help: 'Configure which Gemini model Codex CLI / OpenAI Responses model names should map to.',
            saveLabel: 'Save Responses mapping',
            endpoint: '/api/update-responses-model-mapping',
            defaultField: 'responses_default_model',
            aliasesField: 'responses_model_aliases',
            placeholder: 'Alias, e.g. codex-mini-latest or gpt-*'
          },
          {
            key: 'claude',
            title: 'Claude API Model Mapping',
            help: 'Configure which Gemini model Claude Code / Anthropic model names should map to.',
            saveLabel: 'Save Claude mapping',
            endpoint: '/api/update-claude-model-mapping',
            defaultField: 'claude_default_model',
            aliasesField: 'claude_model_aliases',
            placeholder: 'Alias, e.g. claude-sonnet-* or claude-3-5-haiku-latest'
          }
        ]

        function escapeAttr(value) {
          return String(value || '').replaceAll('&', '&amp;').replaceAll('"', '&quot;').replaceAll('<', '&lt;')
        }

        async function postMapping(panelConfig, defaultModel, aliases, password) {
          const res = await fetch(panelConfig.endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ default_model: defaultModel, aliases, password })
          })
          if (!res.ok) {
            const data = await res.json().catch(() => ({}))
            throw new Error(data.detail || data.error?.message || 'Save failed')
          }
          return res.json()
        }

        function optionHtml(models, selected) {
          return ['<option value="">Auto select first available model</option>']
            .concat(models.map(m => `<option value="${escapeAttr(m)}" ${m === selected ? 'selected' : ''}>${escapeAttr(m)}</option>`))
            .join('')
        }

        function aliasRow(panelConfig, models, alias = '', model = '') {
          const row = document.createElement('div')
          row.className = 'model-mapping-alias-row'
          row.innerHTML = `
            <input class="model-mapping-input alias-name" placeholder="${escapeAttr(panelConfig.placeholder)}" value="${escapeAttr(alias)}">
            <select class="model-mapping-input alias-model">${optionHtml(models, model)}</select>
            <button type="button" class="mapping-remove">Delete</button>
          `
          row.querySelector('.mapping-remove').onclick = () => row.remove()
          return row
        }

        function renderMappingPanel(panelConfig, data, models) {
          const panelId = `${panelConfig.key}-model-mapping-panel`
          if (document.getElementById(panelId)) return
          const aliases = data[panelConfig.aliasesField] || {}
          const panel = document.createElement('div')
          panel.id = panelId
          panel.className = 'model-mapping-panel'
          panel.innerHTML = `
            <h3>${panelConfig.title}</h3>
            <div class="model-mapping-help">${panelConfig.help}</div>
            <div class="model-mapping-row">
              <label>Default target model</label>
              <select class="model-mapping-input default-model">${optionHtml(models, data[panelConfig.defaultField] || '')}</select>
            </div>
            <div class="model-mapping-help">Used when the incoming model name is not available and no custom alias matches.</div>
            <div class="model-mapping-row">
              <strong>Custom aliases (supports * wildcard)</strong>
              <button type="button" class="add-alias">Add mapping</button>
            </div>
            <div class="alias-list"></div>
            <div class="model-mapping-row">
              <input class="model-mapping-input mapping-password" type="password" placeholder="Admin password">
              <button type="button" class="save-mapping">${panelConfig.saveLabel}</button>
              <span class="mapping-message"></span>
            </div>
          `
          const list = panel.querySelector('.alias-list')
          Object.entries(aliases).forEach(([alias, model]) => list.appendChild(aliasRow(panelConfig, models, alias, model)))
          panel.querySelector('.add-alias').onclick = () => list.appendChild(aliasRow(panelConfig, models))
          panel.querySelector('.save-mapping').onclick = async () => {
            const msg = panel.querySelector('.mapping-message')
            const password = panel.querySelector('.mapping-password').value
            const aliasMap = {}
            list.querySelectorAll('.model-mapping-alias-row').forEach(row => {
              const alias = row.querySelector('.alias-name').value.trim()
              const model = row.querySelector('.alias-model').value.trim()
              if (alias && model) aliasMap[alias] = model
            })
            try {
              msg.textContent = 'Saving...'
              await postMapping(panelConfig, panel.querySelector('.default-model').value, aliasMap, password)
              msg.textContent = 'Saved'
              msg.style.color = 'var(--color-success,#28a745)'
            } catch (e) {
              msg.textContent = e.message
              msg.style.color = '#dc3545'
            }
          }
          return panel
        }

        async function renderPanels() {
          if (document.getElementById('responses-model-mapping-panel') && document.getElementById('claude-model-mapping-panel')) return
          const data = await fetch('/api/dashboard-data').then(r => r.json()).catch(() => null)
          if (!data) return
          const models = (data.available_models || []).filter(m => m && m !== 'all')
          const style = document.createElement('style')
          style.textContent = `
            .model-mapping-panel{margin:16px 0;padding:16px;border:1px solid var(--color-border,#ddd);border-radius:12px;background:var(--card-background,#fff);box-shadow:var(--shadow-sm,0 1px 4px #0001)}
            .model-mapping-panel h3{margin:0 0 12px;color:var(--color-heading,#222);font-size:18px}
            .model-mapping-help{font-size:12px;color:var(--color-text-soft,#666);margin:6px 0 12px;line-height:1.5}
            .model-mapping-row{display:flex;gap:10px;align-items:center;margin:10px 0;flex-wrap:wrap}
            .model-mapping-input{padding:8px 10px;border:1px solid var(--color-border,#ddd);border-radius:8px;background:var(--color-background,#fff);color:var(--color-text,#222);min-width:220px}
            .model-mapping-alias-row{display:grid;grid-template-columns:minmax(180px,1fr) minmax(220px,1fr) auto;gap:10px;margin:8px 0}
            .model-mapping-panel button{border:0;border-radius:8px;padding:8px 12px;cursor:pointer;color:white;background:var(--button-primary,#4f46e5)}
            .model-mapping-panel .mapping-remove{background:#dc3545}
            .model-mapping-panel .mapping-message{font-size:13px;margin-left:8px}
            @media(max-width:768px){.model-mapping-alias-row{grid-template-columns:1fr}}
          `
          document.head.appendChild(style)
          const target = document.querySelector('.config-section .info-box') || document.querySelector('.config-section') || document.getElementById('app')
          panels.map(panelConfig => renderMappingPanel(panelConfig, data, models)).filter(Boolean).forEach(panel => target.appendChild(panel))
        }

        const timer = setInterval(() => {
          if (document.querySelector('.config-section') || document.querySelector('.info-box')) {
            clearInterval(timer)
            renderPanels()
          }
        }, 500)
        setTimeout(() => clearInterval(timer), 10000)
      })()
    </script>
  </body>
</html>
