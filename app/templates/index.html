
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/assets/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini API 代理服务</title>
    <script type="module" crossorigin src="/assets/main.js"></script>
    <link rel="stylesheet" href="/assets/index.css">
  </head>
  <body>
    <div id="app"></div>
    <script>
      (() => {
        const panelId = 'responses-model-mapping-panel'
        async function postResponsesMapping(defaultModel, aliases, password) {
          const res = await fetch('/api/update-responses-model-mapping', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ default_model: defaultModel, aliases, password })
          })
          if (!res.ok) {
            const data = await res.json().catch(() => ({}))
            throw new Error(data.detail || 'Save failed')
          }
          return res.json()
        }
        function optionHtml(models, selected) {
          return ['<option value="">Auto select first available model</option>']
            .concat(models.map(m => `<option value="${m.replaceAll('"', '&quot;')}" ${m === selected ? 'selected' : ''}>${m}</option>`))
            .join('')
        }
        function aliasRow(models, alias = '', model = '') {
          const row = document.createElement('div')
          row.className = 'responses-alias-row'
          row.innerHTML = `
            <input class="responses-input responses-alias-name" placeholder="Alias, e.g. codex-mini-latest or gpt-*" value="${alias.replaceAll('"', '&quot;')}">
            <select class="responses-input responses-alias-model">${optionHtml(models, model)}</select>
            <button type="button" class="responses-remove">Delete</button>
          `
          row.querySelector('.responses-remove').onclick = () => row.remove()
          return row
        }
        async function renderPanel() {
          if (document.getElementById(panelId)) return
          const data = await fetch('/api/dashboard-data').then(r => r.json()).catch(() => null)
          if (!data) return
          const models = (data.available_models || []).filter(m => m && m !== 'all')
          const aliases = data.responses_model_aliases || {}
          const panel = document.createElement('div')
          panel.id = panelId
          panel.innerHTML = `
            <style>
              #${panelId}{margin:16px 0;padding:16px;border:1px solid var(--color-border,#ddd);border-radius:12px;background:var(--card-background,#fff);box-shadow:var(--shadow-sm,0 1px 4px #0001)}
              #${panelId} h3{margin:0 0 12px;color:var(--color-heading,#222);font-size:18px}
              #${panelId} .responses-help{font-size:12px;color:var(--color-text-soft,#666);margin:6px 0 12px;line-height:1.5}
              #${panelId} .responses-row{display:flex;gap:10px;align-items:center;margin:10px 0;flex-wrap:wrap}
              #${panelId} .responses-input{padding:8px 10px;border:1px solid var(--color-border,#ddd);border-radius:8px;background:var(--color-background,#fff);color:var(--color-text,#222);min-width:220px}
              #${panelId} .responses-alias-row{display:grid;grid-template-columns:minmax(180px,1fr) minmax(220px,1fr) auto;gap:10px;margin:8px 0}
              #${panelId} button{border:0;border-radius:8px;padding:8px 12px;cursor:pointer;color:white;background:var(--button-primary,#4f46e5)}
              #${panelId} .responses-remove{background:#dc3545}
              #${panelId} .responses-message{font-size:13px;margin-left:8px}
              @media(max-width:768px){#${panelId} .responses-alias-row{grid-template-columns:1fr}}
            </style>
            <h3>Responses API Model Mapping</h3>
            <div class="responses-help">Configure which Gemini model Codex CLI / OpenAI Responses model names should map to.</div>
            <div class="responses-row">
              <label>Default target model</label>
              <select class="responses-input" id="responses-default-model">${optionHtml(models, data.responses_default_model || '')}</select>
            </div>
            <div class="responses-help">Used when the incoming model name is not available and no custom alias matches.</div>
            <div class="responses-row">
              <strong>Custom aliases (supports * wildcard)</strong>
              <button type="button" id="responses-add-alias">Add mapping</button>
            </div>
            <div id="responses-alias-list"></div>
            <div class="responses-row">
              <input class="responses-input" id="responses-password" type="password" placeholder="Admin password">
              <button type="button" id="responses-save">Save Responses mapping</button>
              <span class="responses-message" id="responses-message"></span>
            </div>
          `
          const list = panel.querySelector('#responses-alias-list')
          Object.entries(aliases).forEach(([alias, model]) => list.appendChild(aliasRow(models, alias, model)))
          panel.querySelector('#responses-add-alias').onclick = () => list.appendChild(aliasRow(models))
          panel.querySelector('#responses-save').onclick = async () => {
            const msg = panel.querySelector('#responses-message')
            const password = panel.querySelector('#responses-password').value
            const aliasMap = {}
            list.querySelectorAll('.responses-alias-row').forEach(row => {
              const alias = row.querySelector('.responses-alias-name').value.trim()
              const model = row.querySelector('.responses-alias-model').value.trim()
              if (alias && model) aliasMap[alias] = model
            })
            try {
              msg.textContent = 'Saving...'
              await postResponsesMapping(panel.querySelector('#responses-default-model').value, aliasMap, password)
              msg.textContent = 'Saved'
              msg.style.color = 'var(--color-success,#28a745)'
            } catch (e) {
              msg.textContent = e.message
              msg.style.color = '#dc3545'
            }
          }
          const target = document.querySelector('.config-section .info-box') || document.querySelector('.config-section') || document.getElementById('app')
          target.appendChild(panel)
        }
        const timer = setInterval(() => {
          if (document.querySelector('.config-section') || document.querySelector('.info-box')) {
            clearInterval(timer)
            renderPanel()
          }
        }, 500)
        setTimeout(() => clearInterval(timer), 10000)
      })()
    </script>
  </body>
</html>
